<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Street Food — Zakaz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --card:    #222;
  --border:  #2e2e2e;
  --orange:  #ff6b2b;
  --orange2: #ff9500;
  --green:   #30d158;
  --text:    #f5f5f5;
  --muted:   #888;
  --sub:     #555;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

/* HEADER */
.header {
  background:var(--bg); border-bottom:1px solid var(--border);
  padding:14px 16px 10px;
  position:sticky; top:0; z-index:50;
}
.header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.brand {
  font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
  background:linear-gradient(90deg,var(--orange),var(--orange2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.cart-pill {
  display:flex; align-items:center; gap:7px;
  background:var(--orange); color:#fff;
  border:none; border-radius:50px; padding:8px 14px;
  font-size:14px; font-weight:600; cursor:pointer; transition:transform .15s;
}
.cart-pill:active { transform:scale(.93); }
.badge {
  background:rgba(255,255,255,.25); border-radius:50%;
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
}

/* TABS */
.tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.tabs::-webkit-scrollbar { display:none; }
.tab {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:6px 13px;
  font-size:13px; font-weight:600; color:var(--muted);
  cursor:pointer; white-space:nowrap; transition:all .2s;
}
.tab.active { background:var(--orange); border-color:var(--orange); color:#fff; }

/* GRID */
.grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding:14px 12px 110px;
}
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; position:relative; transition:transform .15s;
}
.card:active { transform:scale(.97); }
.card-emoji {
  background:var(--surface); height:82px;
  display:flex; align-items:center; justify-content:center;
  font-size:44px; border-bottom:1px solid var(--border);
}
.card-dot {
  position:absolute; top:8px; right:8px;
  background:var(--orange); color:#fff; border-radius:50%;
  width:22px; height:22px; display:none;
  align-items:center; justify-content:center;
  font-size:11px; font-weight:800;
}
.card-body { padding:9px 10px 10px; }
.card-name { font-weight:600; font-size:13px; line-height:1.3; margin-bottom:3px; }
.card-price {
  font-family:'Syne',sans-serif; font-size:15px;
  color:var(--orange2); font-weight:700; margin-bottom:7px;
}
.card-price small { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--muted); font-weight:400; }
.qty-row { display:flex; align-items:center; justify-content:space-between; }
.qty-btn {
  background:var(--surface); border:1px solid var(--border);
  color:var(--text); width:28px; height:28px;
  border-radius:8px; font-size:17px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:opacity .15s;
}
.qty-btn.plus { background:var(--orange); border-color:var(--orange); }
.qty-btn:active { opacity:.7; }
.qty-num { font-weight:700; font-size:16px; min-width:24px; text-align:center; }

/* BOTTOM BAR */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-top:1px solid var(--border);
  padding:10px 14px 20px; display:none; z-index:40;
}
.bottom-bar.show { display:block; }
.total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.total-label { font-size:13px; color:var(--muted); }
.total-sum { font-family:'Syne',sans-serif; font-size:20px; color:var(--orange2); font-weight:700; }
.order-btn {
  width:100%;
  background:linear-gradient(90deg,var(--orange),var(--orange2));
  border:none; color:#fff;
  font-family:'Syne',sans-serif; font-size:17px; font-weight:700;
  padding:14px; border-radius:14px; cursor:pointer; transition:transform .15s;
}
.order-btn:active { transform:scale(.98); }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:none; backdrop-filter:blur(3px); }
.overlay.show { display:block; }

/* DRAWER */
.drawer {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-radius:22px 22px 0 0;
  border-top:1px solid var(--border); z-index:110;
  transform:translateY(105%); transition:transform .32s cubic-bezier(.34,1.3,.64,1);
  max-height:90vh; display:flex; flex-direction:column;
}
.drawer.open { transform:translateY(0); }
.d-handle { width:36px; height:4px; background:var(--sub); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.d-head {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 18px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.d-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
.d-close {
  background:var(--card); border:none; color:var(--muted);
  width:30px; height:30px; border-radius:50%; font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.d-body { overflow-y:auto; flex:1; padding:12px 16px; }

/* CART LIST */
.c-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.c-item:last-child { border-bottom:none; }
.c-emoji { font-size:28px; flex-shrink:0; }
.c-info { flex:1; min-width:0; }
.c-name { font-size:13px; font-weight:600; }
.c-sub  { font-size:12px; color:var(--muted); margin-top:1px; }
.c-price { font-family:'Syne',sans-serif; font-size:14px; color:var(--orange2); font-weight:700; flex-shrink:0; }
.del-btn { background:none; border:none; color:var(--sub); font-size:18px; cursor:pointer; padding:4px; }

/* FORM */
.form-sec { padding:14px 0 4px; }
.form-sec-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; font-weight:600; }
.inp {
  width:100%; background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:15px; padding:12px 14px; outline:none; transition:border-color .2s; margin-bottom:10px;
}
.inp:focus { border-color:var(--orange); }
.inp::placeholder { color:var(--sub); }
.del-opts { display:flex; gap:8px; margin-bottom:10px; }
.del-opt {
  flex:1; padding:11px 6px; background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; text-align:center; cursor:pointer; transition:all .2s;
  color:var(--muted); font-size:13px; font-weight:600;
}
.del-opt .dicon { font-size:22px; display:block; margin-bottom:3px; }
.del-opt.sel { border-color:var(--orange); background:rgba(255,107,43,.1); color:var(--text); }

/* FOOTER */
.d-footer { padding:12px 16px 24px; border-top:1px solid var(--border); flex-shrink:0; }
.footer-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.ft-label { font-size:13px; color:var(--muted); }
.ft-sum { font-family:'Syne',sans-serif; font-size:22px; color:var(--orange2); font-weight:700; }
.confirm-btn {
  width:100%;
  background:linear-gradient(90deg,var(--orange),var(--orange2));
  border:none; color:#fff; font-family:'Syne',sans-serif;
  font-size:17px; font-weight:700; padding:14px; border-radius:14px;
  cursor:pointer; transition:transform .15s;
}
.confirm-btn:active { transform:scale(.98); }
.confirm-btn:disabled { background:var(--card); color:var(--sub); cursor:not-allowed; }

/* ERROR */
.err { color:#ff453a; font-size:13px; margin-bottom:8px; display:none; }

/* SUCCESS */
.success-wrap { text-align:center; padding:40px 20px; }
.s-icon { font-size:68px; }
.s-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--green); margin:12px 0 8px; }
.s-msg { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:24px; }
.new-btn {
  background:var(--orange); border:none; color:#fff;
  font-family:'Syne',sans-serif; font-size:16px;
  padding:13px 32px; border-radius:12px; cursor:pointer;
}
.empty-msg { text-align:center; padding:30px 0; color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div class="brand">🌭 STREET FOOD</div>
    <button class="cart-pill" onclick="openDrawer()">
      🛒 Zakaz <div class="badge" id="cartCount">0</div>
    </button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <div class="total-row">
    <span class="total-label">Jami:</span>
    <span class="total-sum" id="totalSum">0 so'm</span>
  </div>
  <button class="order-btn" onclick="openDrawer()">📋 Zakazni rasmiylashtirish →</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="d-handle"></div>

  <!-- Cart view -->
  <div id="viewCart" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="d-head">
      <div class="d-title">🛒 ZAKAZ</div>
      <button class="d-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="d-body">
      <div id="cartList"></div>
      <div class="form-sec">
        <div class="form-sec-title">Yetkazib berish usuli</div>
        <div class="del-opts">
          <div class="del-opt sel" id="optDel"  onclick="setDel('delivery')"><span class="dicon">🛵</span>Yetkazish</div>
          <div class="del-opt"     id="optPick" onclick="setDel('pickup')"><span class="dicon">🏃</span>O'zi oladi</div>
        </div>
      </div>
      <div class="form-sec">
        <div class="form-sec-title">Mijoz ma'lumotlari</div>
        <div class="err" id="errMsg"></div>
        <input class="inp" id="fName"  placeholder="Mijoz ismi *"             type="text">
        <input class="inp" id="fPhone" placeholder="Telefon: +998901234567 *" type="tel">
        <div id="addrWrap">
          <input class="inp" id="fAddr" placeholder="Manzil (ko'cha, uy)" type="text">
        </div>
        <input class="inp" id="fNote" placeholder="Izoh (ixtiyoriy)" type="text">
      </div>
    </div>
    <div class="d-footer">
      <div class="footer-total">
        <span class="ft-label">Jami summa:</span>
        <span class="ft-sum" id="drawerTotal">0 so'm</span>
      </div>
      <button class="confirm-btn" id="confirmBtn" onclick="placeOrder()">✅ ZAKAZNI YUBORISH</button>
    </div>
  </div>

  <!-- Success view -->
  <div id="viewSuccess" style="display:none; overflow-y:auto;">
    <div class="success-wrap">
      <div class="s-icon">🎉</div>
      <div class="s-title">ZAKAZ YUBORILDI!</div>
      <div class="s-msg">Kuryer Telegram da xabar oldi.<br>Zakaz tayyorlanmoqda! 🍳</div>
      <button class="new-btn" onclick="newOrder()">+ Yangi zakaz</button>
    </div>
  </div>
</div>

<script>
// ─── Telegram WebApp ─────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ─── MENYU ───────────────────────────────────────────────────
const CATS = [
  { id:'all',    label:'🍽 Barchasi' },
  { id:'hotdog', label:'🌭 Hot-dog'  },
  { id:'burger', label:'🍔 Burger'   },
  { id:'lavash', label:'🌯 Lavash'   },
  { id:'kabob',  label:'🍢 Kabob'    },
];
const MENU = [
  { id:1,  cat:'hotdog', name:'Klassik Hot-dog',   emoji:'🌭', price:15000 },
  { id:2,  cat:'hotdog', name:"Go'shtli Hot-dog",  emoji:'🌭', price:22000 },
  { id:3,  cat:'hotdog', name:'Pishloqli Hot-dog', emoji:'🌭', price:19000 },
  { id:4,  cat:'burger', name:'Chizburger',        emoji:'🍔', price:18000 },
  { id:5,  cat:'burger', name:'Gamburger',         emoji:'🍔', price:16000 },
  { id:6,  cat:'burger', name:'Double Burger',     emoji:'🍔', price:28000 },
  { id:7,  cat:'lavash', name:'Tovuq Lavash',      emoji:'🌯', price:24000 },
  { id:8,  cat:'lavash', name:"Go'shtli Lavash",   emoji:'🌯', price:27000 },
  { id:9,  cat:'lavash', name:'Shaurma',           emoji:'🥙', price:30000 },
  { id:10, cat:'kabob',  name:'Lula Kabob',        emoji:'🍢', price:32000 },
  { id:11, cat:'kabob',  name:'Tikka Kabob',       emoji:'🍢', price:35000 },
  { id:12, cat:'kabob',  name:'Mix Kabob (3ta)',   emoji:'🍢', price:45000 },
];

// ─── STATE ───────────────────────────────────────────────────
let cart    = {};
let curCat  = 'all';
let delType = 'delivery';

// ─── TABS ────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c =>
    `<div class="tab ${c.id===curCat?'active':''}" onclick="setCat('${c.id}')">${c.label}</div>`
  ).join('');
}
function setCat(id) { curCat = id; renderTabs(); renderGrid(); }

// ─── GRID ────────────────────────────────────────────────────
function renderGrid() {
  const items = curCat === 'all' ? MENU : MENU.filter(m => m.cat === curCat);
  document.getElementById('grid').innerHTML = items.map(m => {
    const qty = cart[m.id] || 0;
    return `
    <div class="card">
      <div class="card-emoji">${m.emoji}</div>
      <div class="card-dot" id="dot-${m.id}" style="${qty>0?'display:flex':''}">${qty||''}</div>
      <div class="card-body">
        <div class="card-name">${m.name}</div>
        <div class="card-price">${m.price.toLocaleString()} <small>so'm</small></div>
        <div class="qty-row">
          <div class="qty-btn"      onclick="chg(${m.id},-1)">−</div>
          <div class="qty-num" id="qty-${m.id}">${qty}</div>
          <div class="qty-btn plus" onclick="chg(${m.id},1)">+</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── CART ────────────────────────────────────────────────────
function chg(id, delta) {
  cart[id] = Math.max(0, (cart[id]||0) + delta);
  if (!cart[id]) delete cart[id];
  const q = cart[id]||0;
  const qEl = document.getElementById('qty-'+id);
  const dEl = document.getElementById('dot-'+id);
  if (qEl) qEl.textContent = q;
  if (dEl) { dEl.style.display = q>0?'flex':'none'; dEl.textContent = q; }
  refreshTotals();
}

function calcTotal() {
  return Object.entries(cart).reduce((s,[id,qty]) => {
    const m = MENU.find(x => x.id===+id);
    return s + (m ? m.price*qty : 0);
  }, 0);
}
function totalCount() { return Object.values(cart).reduce((a,b)=>a+b, 0); }

function refreshTotals() {
  const total = calcTotal();
  const count = totalCount();
  document.getElementById('cartCount').textContent   = count;
  document.getElementById('totalSum').textContent    = total.toLocaleString()+' so\'m';
  document.getElementById('drawerTotal').textContent = total.toLocaleString()+' so\'m';
  document.getElementById('bottomBar').classList.toggle('show', count>0);
  document.getElementById('confirmBtn').disabled = count===0;
}

// ─── DELIVERY TYPE ───────────────────────────────────────────
function setDel(type) {
  delType = type;
  document.getElementById('optDel').classList.toggle('sel',  type==='delivery');
  document.getElementById('optPick').classList.toggle('sel', type==='pickup');
  document.getElementById('addrWrap').style.display = type==='delivery'?'block':'none';
}

// ─── DRAWER ──────────────────────────────────────────────────
function openDrawer() {
  renderCartList();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('open');
}

function renderCartList() {
  const keys = Object.keys(cart).filter(k=>cart[k]>0);
  const el   = document.getElementById('cartList');
  if (!keys.length) { el.innerHTML='<div class="empty-msg">🛒 Savatcha bo\'sh</div>'; return; }
  el.innerHTML = keys.map(id => {
    const m = MENU.find(x=>x.id===+id);
    return `
    <div class="c-item">
      <div class="c-emoji">${m.emoji}</div>
      <div class="c-info">
        <div class="c-name">${m.name}</div>
        <div class="c-sub">${cart[id]} × ${m.price.toLocaleString()}</div>
      </div>
      <div class="c-price">${(m.price*cart[id]).toLocaleString()}</div>
      <button class="del-btn" onclick="removeItem(${id})">✕</button>
    </div>`;
  }).join('');
}

function removeItem(id) {
  delete cart[id];
  const dEl = document.getElementById('dot-'+id);
  const qEl = document.getElementById('qty-'+id);
  if (dEl) dEl.style.display='none';
  if (qEl) qEl.textContent='0';
  refreshTotals();
  renderCartList();
}

// ─── PLACE ORDER ─────────────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display='block';
}

function placeOrder() {
  document.getElementById('errMsg').style.display = 'none';

  const name  = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim().replace(/\s/g,'');
  const addr  = delType==='delivery' ? document.getElementById('fAddr').value.trim() : '';
  const note  = document.getElementById('fNote').value.trim();

  if (!name)  { showErr('❌ Mijoz ismini kiriting'); return; }
  if (!phone) { showErr('❌ Telefon raqamini kiriting'); return; }
  if (!/^\+?[0-9]{9,13}$/.test(phone)) {
    showErr('❌ Telefon noto\'g\'ri (masalan: +998901234567)');
    return;
  }
  if (!totalCount()) { showErr('❌ Savatcha bo\'sh'); return; }

  // Ikki marta bosilishdan himoya
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Yuborilmoqda...';

  const items = Object.keys(cart).filter(k=>cart[k]>0).map(id => {
    const m = MENU.find(x=>x.id===+id);
    return { name:m.name, emoji:m.emoji, qty:cart[id], price:m.price };
  });

  const payload = { name, phone, addr, note, delType, items, total:calcTotal() };

  if (tg) {
    // sendData yuboradi va Mini Appni yopadi
    tg.sendData(JSON.stringify(payload));
  }

  // Success ko'rinish
  document.getElementById('viewCart').style.display    = 'none';
  document.getElementById('viewSuccess').style.display = 'block';
}

function newOrder() {
  cart = {};
  ['fName','fPhone','fAddr','fNote'].forEach(id => document.getElementById(id).value='');
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = '✅ ZAKAZNI YUBORISH';
  document.getElementById('viewCart').style.display    = 'flex';
  document.getElementById('viewSuccess').style.display = 'none';
  refreshTotals();
  closeDrawer();
  renderGrid();
}

// ─── INIT ────────────────────────────────────────────────────
renderTabs();
renderGrid();
</script>
</body>
</html>
